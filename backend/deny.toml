# cargo-deny policy for the printing-erp backend (CLAUDE.md §3/§8: `cargo deny
# check` and `cargo audit` are CI gates). Run from `backend/`:
#
#     cargo deny check
#
# Schema is the cargo-deny v2 format (cargo-deny >= 0.18).

[advisories]
# `cargo deny` resolves advisories against the actual build graph. It never sees
# the vulnerable `rsa` crate (RUSTSEC-2023-0071) because the MySQL driver is
# feature-disabled, so that advisory is suppressed only in `.cargo/audit.toml`
# (which scans Cargo.lock). The advisories below, by contrast, ARE in the
# compiled graph: they come from `aws-sdk-s3`'s default TLS connector
# (hyper-rustls 0.24 / rustls 0.21), pulled in by issue #16's object storage.
# Production reaches R2/S3 through the SDK's maintained client; the same IDs and
# rationale are mirrored in `.cargo/audit.toml`. Remove each once the SDK bumps
# its connector.
# Only the four advisories cargo-deny actually resolves in the build graph are
# listed; `time`/`lru` advisories that audit flags from Cargo.lock are not in
# deny's graph, so listing them here would only emit `advisory-not-detected`.
ignore = [
    "RUSTSEC-2026-0104", # rustls-webpki: reachable panic parsing a CRL
    "RUSTSEC-2026-0098", # rustls-webpki: URI-name constraints accepted
    "RUSTSEC-2026-0099", # rustls-webpki: wildcard name constraints accepted
    "RUSTSEC-2025-0134", # rustls-pemfile 1.x unmaintained
]

[licenses]
# Permissive licenses present across the dependency tree. A new dependency on a
# license not listed here fails the gate and must be reviewed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# Large async trees (axum + sqlx + opentelemetry) unavoidably pull duplicate
# transitive versions; not actionable in app code (CLAUDE.md Cargo.toml note).
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
