name: printing-erp

# Local development infrastructure: PostgreSQL (system of record) and Redis
# (background-job queue / cache). The backend and frontend run on the host
# during development; only the stateful services are containerized here.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Cluster-init scripts (run once on first data-dir creation). Provisions
      # the least-privilege `erp_app` role required for Row-Level Security.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage for assets (issue #16). In production the app
  # points at AWS S3 or Cloudflare R2; locally we run MinIO so the full presigned
  # upload/download flow works offline. The API (9000) is published on localhost
  # so presigned URLs — which embed the endpoint host — are reachable from the
  # browser; the console is on 9001.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Used as the SigV4 access key id / secret by the backend. The password
      # must be at least 8 characters (MinIO requirement).
      MINIO_ROOT_USER: erp
      MINIO_ROOT_PASSWORD: erp_secret_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # One-shot: wait for MinIO, then create the assets bucket. Exits 0 when done.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 erp erp_secret_dev; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/erp-assets;
      exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
