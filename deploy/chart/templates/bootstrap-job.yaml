{{- if .Values.bootstrap.enabled }}
# Optional self-host convenience: create the least-privilege `erp_app` role
# (mirrors db/init/00-app-role.sql) before the app starts. Runs as a Helm
# pre-install/pre-upgrade hook using the admin DB URL from the backend Secret.
# In our own clusters the infra layer provisions the DB + role, so this is off.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "printing-erp.fullname" . }}-bootstrap
  labels:
    {{- include "printing-erp.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "printing-erp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bootstrap
          image: "{{ .Values.bootstrap.image.repository }}:{{ .Values.bootstrap.image.tag }}"
          env:
            - name: APP__DATABASE__ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "printing-erp.backendSecretName" . }}
                  key: APP__DATABASE__ADMIN_URL
            - name: APP_ROLE_PASSWORD
              value: {{ .Values.bootstrap.appRolePassword | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              role_exists=$(psql "$APP__DATABASE__ADMIN_URL" -tAc "SELECT 1 FROM pg_roles WHERE rolname = 'erp_app'")
              if [ "$role_exists" = "1" ]; then
                echo "role erp_app already exists; nothing to do"
              else
                psql "$APP__DATABASE__ADMIN_URL" -v ON_ERROR_STOP=1 -v passwd="$APP_ROLE_PASSWORD" \
                  -c "CREATE ROLE erp_app LOGIN PASSWORD :'passwd' NOSUPERUSER NOBYPASSRLS"
                echo "created role erp_app"
              fi
{{- end }}
