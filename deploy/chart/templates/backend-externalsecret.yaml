{{- if .Values.externalSecret.enabled }}
# Syncs the backend's secret env vars from an External Secrets store (OpenBao /
# Vault) into a Secret named like the release. The Deployment consumes it via
# envFrom, so the data keys must be the literal APP__* env var names.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "printing-erp.fullname" . }}-backend
  labels:
    {{- include "printing-erp.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStore.name }}
    kind: {{ .Values.externalSecret.secretStore.kind }}
  target:
    name: {{ include "printing-erp.fullname" . }}-backend
    creationPolicy: Owner
  data:
    {{- toYaml .Values.externalSecret.data | nindent 4 }}
{{- end }}
