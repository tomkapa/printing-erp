# nginx server block for the printing-erp SPA. Pure static serving — the backend
# is reached under /api and /health, which the Ingress routes to the API service;
# those prefixes never hit this container, so no proxying is needed.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Cheap nginx-level liveness ping (k8s app probes hit the backend's /health/*
    # through the Ingress; this only proves nginx itself is up).
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Fingerprinted Vite bundles (default output dir /assets — no longer collides
    # with the backend, which now lives under /api). Immutable, so cache hard.
    # A miss here is a genuine 404, not the SPA shell.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: unmatched paths return the app shell for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
