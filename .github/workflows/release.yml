name: release

# Builds the backend + frontend images. Pushes to GHCR on main, version tags, and
# same-repo PRs (the pr-<n> tag feeds homelab preview environments). Forked PRs
# build for validation but never push — GITHUB_TOKEN is read-only there anyway.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    concurrency:
      group: release-${{ github.ref }}-${{ matrix.component }}
      cancel-in-progress: true
    steps:
      # Actions pinned to commit SHAs (supply-chain hardening; dependabot keeps
      # them current). persist-credentials off — this job only needs the token
      # for the GHCR login step below, not git.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Decide whether to push
        id: gate
        # Push for everything except PRs from forks (which can't authenticate).
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: steps.gate.outputs.push == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/printing-erp-${{ matrix.component }}
          tags: |
            type=sha
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.component }}
          file: ${{ matrix.component }}/Dockerfile
          push: ${{ steps.gate.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
