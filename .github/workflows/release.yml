name: release

# Builds the backend + frontend images. Pushes to GHCR on main, version tags, and
# same-repo PRs (the pr-<n> tag feeds homelab preview environments). Forked PRs
# build for validation but never push — GITHUB_TOKEN is read-only there anyway.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    concurrency:
      group: release-${{ github.ref }}-${{ matrix.component }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Decide whether to push
        id: gate
        # Push for everything except PRs from forks (which can't authenticate).
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.gate.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/printing-erp-${{ matrix.component }}
          tags: |
            type=sha
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component }}
          file: ${{ matrix.component }}/Dockerfile
          push: ${{ steps.gate.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
